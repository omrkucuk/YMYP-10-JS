<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>To-Do List</h2>

      <div class="input-area">
        <input id="gorevInput" type="text" placeholder="Görev yaz..." />
        <button id="ekleBtn">Ekle</button>
      </div>

      <div class="filters">
        <button class="filter active" data-filter="all">Tümü</button>
        <button class="filter" data-filter="completed">Tamamlananlar</button>
        <button class="filter" data-filter="uncompleted">Tamamlanmayanlar</button>
      </div>

      <ul id="liste"></ul>
      <p style="text-align: center">Kayıtlı Görev Yok</p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
