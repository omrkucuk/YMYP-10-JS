<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classes Styles</title>

    <style>
      .title {
        background-color: bisque;
      }
      .f20 {
        font-size: 20px;
      }
      .f22 {
        font-size: 22px;
      }
      .red {
        color: red;
      }
      .active {
        color: yellow;
      }
    </style>
  </head>
  <body>
    <h1 class="title f20">List Items</h1>

    <ul class="items">
      <li>item 1</li>
      <li class="active">item 2</li>
      <li>item 3</li>
    </ul>

    <button>Click</button>

    <script src="script.js"></script>
  </body>
</html>
