<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div>
      <h1>To-Do List</h1>
    </div>

    <form>
      <div>
        <input
          class="form-control"
          name="newItem"
          id="newItem"
          type="text"
          placeholder="Enter new item"
          aria-label="default input example"
        />
        <button class="btn btn-secondary mt-2" type="submit">Add</button>
      </div>
    </form>

    <div class="mt-3">
      <a class="btn btn-sm btn-outline-primary" href="#" id="all">All</a>
      <a class="btn btn-sm btn-outline-warning" href="#" id="all">Incomplete</a>
      <a class="btn btn-sm btn-outline-success" href="#" id="all">Compeleted</a>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="script.js"></script>
  </body>
</html>
